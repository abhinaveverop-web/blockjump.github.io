        // virtual:/main.js
kaplay({
  background: [0, 255, 255]
});
scene("start", () => {
  add([text("Press space/tap to start")]);
  onButtonPress("space", () => {
    go("game");
  });
  onClick(() => {
    go("game");
  });
});
scene("game", () => {
  setGravity(2200);
  let score = 0;
  let r1 = rand(0, 255);
  let r2 = rand(0, 255);
  let r3 = rand(0, 255);
  const scoreLabel = add([
    text("Score " + score),
    pos(20, 20)
  ]);
  const bird = add([
    rect(15, 20),
    color(YELLOW),
    outline(4),
    pos(90, 100),
    body(),
    area(),
    "bird"
  ]);
  add([
    rect(width(), 40),
    pos(0, height() - 40),
    area(),
    body({ isStatic: true }),
    color(GREEN),
    "floor"
  ]);
  add([
    rect(width(), 4),
    pos(0, 0),
    area(),
    body({ isStatic: true }),
    color(0, 255, 255),
    "roof"
  ]);
  onKeyDown("space", () => {
    bird.jump(350);
  });
  onClick("space", () => {
    bird.jump(350);
  });
  bird.onCollide("pillar", () => {
    addKaboom(bird.pos);
    wait(0.3, () => {
      go("lose");
    });
  });
  bird.onCollide("floor", () => {
    addKaboom(bird.pos);
    wait(0.3, () => {
      go("lose");
    });
  });
  bird.onCollide("roof", () => {
    addKaboom(bird.pos);
    wait(0.3, () => {
      go("lose");
    });
  });
  function spawnPillars() {
    let r12 = rand(0, 255);
    let r22 = rand(0, 255);
    let r32 = rand(0, 255);
    const gap = 170;
    const pillarHeight = rand(0, 250);
    const bottom = add([
      rect(40, pillarHeight),
      pos(width(), height() - pillarHeight),
      area(),
      body({ isStatic: true }),
      color(r12, r22, r32),
      outline(3),
      "pillar"
    ]);
    const topHeight = height() - pillarHeight - gap;
    const top = add([
      rect(40, topHeight),
      pos(width(), 0),
      area(),
      body({ isStatic: true }),
      color(r12, r22, r32),
      outline(3),
      "pillar"
    ]);
    bottom.onUpdate(() => {
      bottom.move(-200, 0);
      if (bottom.pos.x < -50) {
        destroy(bottom);
        score++;
        scoreLabel.text = "Score " + score;
      }
    });
    top.onUpdate(() => {
      top.move(-200, 0);
      if (top.pos.x < -50) {
        destroy(top);
      }
    });
  }
  loop(1.5, () => {
    spawnPillars();
  });
});
scene("lose", () => {
  add([
    text("Game Over"),
    pos(100, 100)
  ]);
  add([
    text("Press Space/Click To Try Again"),
    pos(100, 140)
  ]);
  onKeyPress("space", () => {
    go("game");
  });
  onClick("space", () => {
    go("game");
  });
});
go("game");

        // virtual:/main.js
kaplay({
  background: [0, 255, 255]
});
scene("start", () => {
  add([text("Press space/tap to start")]);
  onButtonPress("space", () => {
    go("game");
  });
});
scene("game", () => {
  setGravity(2200);
  let score = 0;
  let r1 = rand(0, 255);
  let r2 = rand(0, 255);
  let r3 = rand(0, 255);
  const scoreLabel = add([
    text("Score " + score),
    pos(20, 20)
  ]);
  const bird = add([
    rect(15, 20),
    color(YELLOW),
    outline(4),
    pos(90, 100),
    body(),
    area(),
    "bird"
  ]);
  add([
    rect(width(), 40),
    pos(0, height() - 40),
    area(),
    body({ isStatic: true }),
    color(GREEN),
    "floor"
  ]);
  add([
    rect(width(), 4),
    pos(0, 0),
    area(),
    body({ isStatic: true }),
    color(0, 255, 255),
    "roof"
  ]);
  onKeyDown("space", () => {
    bird.jump(350);
  });
  onClick("space", () => {
    bird.jump(350);
  });
  bird.onCollide("pillar", () => {
    addKaboom(bird.pos);
    wait(0.3, () => {
      go("lose");
    });
  });
  bird.onCollide("floor", () => {
    addKaboom(bird.pos);
    wait(0.3, () => {
      go("lose");
    });
  });
  bird.onCollide("roof", () => {
    addKaboom(bird.pos);
    wait(0.3, () => {
      go("lose");
    });
  });
  function spawnPillars() {
    let r12 = rand(0, 255);
    let r22 = rand(0, 255);
    let r32 = rand(0, 255);
    const gap = 170;
    const pillarHeight = rand(0, 250);
    const bottom = add([
      rect(40, pillarHeight),
      pos(width(), height() - pillarHeight),
      area(),
      body({ isStatic: true }),
      color(r12, r22, r32),
      outline(3),
      "pillar"
    ]);
    const topHeight = height() - pillarHeight - gap;
    const top = add([
      rect(40, topHeight),
      pos(width(), 0),
      area(),
      body({ isStatic: true }),
      color(r12, r22, r32),
      outline(3),
      "pillar"
    ]);
    bottom.onUpdate(() => {
      bottom.move(-200, 0);
      if (bottom.pos.x < -50) {
        destroy(bottom);
        score++;
        scoreLabel.text = "Score " + score;
      }
    });
    top.onUpdate(() => {
      top.move(-200, 0);
      if (top.pos.x < -50) {
        destroy(top);
      }
    });
  }
  loop(1.5, () => {
    spawnPillars();
  });
});
scene("lose", () => {
  add([
    text("Game Over"),
    pos(100, 100)
  ]);
  add([
    text("Press Space/Click To Try Again"),
    pos(100, 140)
  ]);
  onKeyPress("space", () => {
    go("game");
  });
  onClick(() => {
    go("game");
  });
});
go("game");
